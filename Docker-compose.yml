services:
  mongo:
    image: mongo
    container_name: notes-mongo
    ports:
      - "27017:27017"
    restart: always
    environment:
      ME_CONFIG_MONGO_URI: "mongodb+srv://harisharish982005_db_user:g5FbS8bCSYKmXn1x@cluster0.3l8ltzw.mongodb.net/?appName=Cluster0"
      ME_CONFIG_BASICAUTH_ENABLED: true
      ME_CONFIG_BASICAUTH_USERNAME: harisharish982005_db_user
      ME_CONFIG_BASICAUTH_PASSWORD: g5FbS8bCSYKmXn1x
    networks:
      - notesapps
    

  backend:
   build: ./backend
   container_name: notesapp-backend
   restart: always
   depends_on:
    - mongo
   env_file:
    - ./backend/.env
   ports:
     - "5001:5001"
   networks:
